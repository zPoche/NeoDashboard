# Inside your apache httpd virtual host
<Location /games/lego-universe/nexus-dashboard>
   ProxyPass http://internal.example.com:8000 retry=0
   ProxyPassReverse  http://internal.example.com:8000
   RequestHeader    set X-Script-Name "/games/lego-universe/nexus-dashboard"
   RequestHeader    set X-Forwarded-Prefix "/games/lego-universe/nexus-dashboard"
</Location>

